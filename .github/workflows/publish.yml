name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      package:
        description: 'Specific package to publish (optional)'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build all packages
        run: npm run build
      
      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Define packages in dependency order (core first, then dependents)
          PACKAGES=("core" "cli" "plugin" "viewer")
          FAILED_PACKAGES=()
          
          # If specific package requested, publish only that one
          if [ -n "${{ inputs.package }}" ]; then
            PACKAGES=("${{ inputs.package }}")
          fi
          
          for pkg in "${PACKAGES[@]}"; do
            echo "Processing package: $pkg"
            cd packages/$pkg
            
            # Get package name and version
            PKG_NAME=$(node -p "require('./package.json').name")
            PKG_VERSION=$(node -p "require('./package.json').version")
            
            # Check if version already exists on npm
            if npm view $PKG_NAME versions --json 2>/dev/null | grep -q "\"$PKG_VERSION\""; then
              echo "⚠️  $PKG_NAME@$PKG_VERSION already published, skipping"
              cd ../..
              continue
            fi
            
            echo "📦 Publishing $PKG_NAME@$PKG_VERSION"
            if npm publish --access public --provenance; then
              echo "✅ Successfully published $PKG_NAME@$PKG_VERSION"
              # Wait for npm registry to process the package
              echo "⏳ Waiting 30s for npm registry to process..."
              sleep 30
            else
              echo "❌ Failed to publish $PKG_NAME@$PKG_VERSION"
              FAILED_PACKAGES+=("$PKG_NAME@$PKG_VERSION")
            fi
            
            cd ../..
          done
          
          # Report results
          if [ ${#FAILED_PACKAGES[@]} -gt 0 ]; then
            echo "::error::Failed to publish: ${FAILED_PACKAGES[*]}"
            exit 1
          fi
          
          echo "🎉 All packages published successfully!"